repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        always_run: true
        pass_filenames: false
        types_or: [python, pyi]
      - id: ruff-format-check
        name: ruff format check
        entry: ruff format --check .
        language: system
        always_run: true
        pass_filenames: false
        types_or: [python, pyi]
      - id: mypy
        name: mypy
        entry: mypy src
        language: system
        always_run: true
        pass_filenames: false
        types_or: [python, pyi]
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
